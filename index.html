<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>풋살 성적 기록</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --blue: #1A8FE3; --blue-dark: #1270B8;
  --green: #00C896; --green-dark: #00A07A;
  --bg: #F0F2F5; --card: #fff; --text: #111827;
  --sub: #6B7280; --hint: #9CA3AF; --border: #E5E7EB;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --r: 16px; --rs: 10px;
  --win: #16A34A; --win-bg: #DCFCE7;
  --draw: #D97706; --draw-bg: #FEF3C7;
  --loss: #DC2626; --loss-bg: #FEE2E2;
}
html,body { background: var(--bg); font-family: 'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 80px; min-height: 100vh; }

/* 헤더 */
.hdr { background: linear-gradient(135deg,var(--blue),var(--blue-dark)); padding: 20px 16px 16px; padding-top: calc(20px + env(safe-area-inset-top)); color:#fff; }
.hdr h1 { font-size:20px; font-weight:700; }
.hdr p { font-size:13px; opacity:.75; margin-top:2px; }

/* 탭 */
.tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.tab { flex:1; padding:14px 4px; font-size:13px; font-weight:500; color:var(--sub); border:none; background:none; cursor:pointer; border-bottom:3px solid transparent; }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:700; }

/* 섹션 */
.sec { display:none; padding:14px 12px; }
.sec.active { display:block; }

/* 카드 */
.card { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:16px; margin-bottom:12px; }
.card-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:14px; }

/* 폼 */
.field { margin-bottom:12px; }
.fl { font-size:12px; font-weight:600; color:var(--sub); margin-bottom:6px; letter-spacing:.3px; text-transform:uppercase; }
input[type=date],input[type=text],input[type=number],select {
  width:100%; padding:13px 14px; border:1.5px solid var(--border); border-radius:var(--rs);
  font-size:16px; font-family:inherit; color:var(--text); background:#F9FAFB; outline:none; -webkit-appearance:none;
}
input:focus,select:focus { border-color:var(--blue); background:#fff; }

/* 버튼 */
.btn { padding:13px 18px; border-radius:var(--rs); font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; border:none; }
.btn-primary { background:linear-gradient(135deg,var(--blue),var(--blue-dark)); color:#fff; width:100%; padding:15px; font-size:17px; box-shadow:0 4px 12px rgba(26,143,227,.35); }
.btn-primary:active { opacity:.85; transform:scale(.98); }
.btn-outline { background:#fff; border:1.5px solid var(--border); color:var(--sub); padding:11px 14px; font-size:14px; font-weight:600; }
.btn-danger { background:#FEE2E2; color:var(--loss); padding:10px 16px; font-size:14px; font-weight:600; border-radius:8px; }
.btn-row { display:flex; gap:8px; margin-top:10px; }

/* 참석 칩 */
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.chip { padding:10px 18px; border-radius:20px; font-size:15px; font-weight:500; cursor:pointer; border:1.5px solid var(--border); background:#F9FAFB; color:var(--sub); user-select:none; }
.chip.on { background:#DBEAFE; border-color:var(--blue); color:var(--blue); font-weight:700; }
.att-cnt { font-size:13px; color:var(--sub); }
.att-cnt span { color:var(--blue); font-weight:700; }

/* 팀 배정 — 좌우 패널 */
.team-panels { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.tp { border-radius:var(--rs); overflow:hidden; }
.tp-a { border:1.5px solid #BFDBFE; }
.tp-b { border:1.5px solid #A7F3D0; }
.tp-head { padding:10px 12px; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:space-between; }
.tp-head-a { background:#EFF6FF; color:var(--blue-dark); }
.tp-head-b { background:#ECFDF5; color:var(--green-dark); }
.tp-cnt { font-size:12px; font-weight:500; opacity:.7; }
.tp-body { background:var(--card); display:grid; grid-template-columns:1fr 1fr; }
.tp-chip { display:block; width:100%; padding:12px 8px; font-size:13px; font-weight:500; color:var(--text); text-align:center; border:none; border-top:1px solid var(--border); background:var(--card); cursor:pointer; font-family:inherit; }
.tp-chip:nth-child(odd) { border-right:1px solid var(--border); }
.tp-chip:active { background:#F9FAFB; }
.tp-chip.in-a { background:#EFF6FF; color:var(--blue-dark); font-weight:700; }
.tp-chip.in-b { background:#ECFDF5; color:var(--green-dark); font-weight:700; }
.tp-chip.in-other { opacity:.3; cursor:not-allowed; }
.tp-hint { font-size:12px; color:var(--hint); margin-top:6px; margin-bottom:2px; }

/* 점수판 */
.scoreboard { background:#0F172A; border-radius:var(--rs); padding:16px 12px; margin:14px 0; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.sc-team { text-align:center; flex:1; }
.sc-label { font-size:12px; font-weight:700; letter-spacing:1px; margin-bottom:8px; }
.sc-a { color:#60A5FA; } .sc-b { color:#34D399; }
.sc-input input { background:#1E293B; border:1.5px solid #334155; color:#F1F5F9; font-size:36px; font-weight:800; text-align:center; border-radius:10px; padding:10px 4px; width:88px; font-family:inherit; -webkit-appearance:none; }
.sc-input input:focus { border-color:#60A5FA; }
.sc-div { color:#475569; font-size:32px; font-weight:800; }

/* 배지 */
.badge { display:inline-flex; align-items:center; padding:5px 12px; border-radius:20px; font-size:13px; font-weight:700; }
.bw { background:var(--win-bg); color:var(--win); }
.bd { background:var(--draw-bg); color:var(--draw); }
.bl { background:var(--loss-bg); color:var(--loss); }

/* 경기 카드 */
.gc { background:var(--card); border-radius:var(--rs); box-shadow:var(--shadow-sm); padding:14px; margin-bottom:10px; }
.gc-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.gc-date { font-size:13px; color:var(--hint); font-weight:500; }
.gc-row { display:grid; grid-template-columns:1fr 64px 1fr; align-items:center; gap:8px; }
.gc-names { font-size:13px; color:var(--sub); line-height:1.5; }
.gc-score { background:#0F172A; border-radius:10px; padding:10px 4px; text-align:center; color:#F1F5F9; font-size:20px; font-weight:800; }
.gc-gi { font-size:12px; color:var(--hint); margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }

/* 통계 요약 */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.sb { background:var(--card); border-radius:var(--rs); box-shadow:var(--shadow-sm); padding:14px; }
.sb-label { font-size:11px; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
.sb-val { font-size:24px; font-weight:800; color:var(--text); line-height:1.1; }
.sb-val span { font-size:13px; font-weight:600; color:var(--sub); }
.sb-leader { font-size:12px; color:var(--blue); font-weight:600; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* 순위표 */
.rtable { width:100%; border-collapse:collapse; font-size:14px; }
.rtable th { padding:10px 6px; font-size:11px; font-weight:700; color:var(--sub); text-align:center; border-bottom:2px solid var(--border); text-transform:uppercase; letter-spacing:.3px; }
.rtable th:nth-child(2) { text-align:left; }
.rtable td { padding:12px 6px; text-align:center; border-bottom:1px solid var(--border); color:var(--text); font-weight:500; }
.rtable td:nth-child(2) { text-align:left; font-weight:700; }
.rtable tr:last-child td { border-bottom:none; }
.rn { width:26px; height:26px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
.r1 { background:#FEF3C7; color:#B45309; }
.r2 { background:#F1F5F9; color:#64748B; }
.r3 { background:#FEE2E2; color:#B91C1C; }
.r0 { background:var(--bg); color:var(--sub); }
.pts { background:linear-gradient(135deg,var(--blue),var(--blue-dark)); color:#fff; border-radius:8px; padding:4px 10px; font-size:13px; font-weight:700; }

/* 선수 관리 */
.pr { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
.pr:last-child { border-bottom:none; }
.pav { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--blue-dark)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:700; margin-right:12px; flex-shrink:0; }
.pi { display:flex; align-items:center; flex:1; }
.pn { font-size:16px; font-weight:600; color:var(--text); }

/* 기타 */
.step-ind { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.sn { width:28px; height:28px; border-radius:50%; background:var(--blue); color:#fff; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sn.done { background:var(--green); }
.st { font-size:16px; font-weight:700; color:var(--text); }
.divider { border:none; border-top:1px solid var(--border); margin:14px 0; }
.empty { text-align:center; padding:40px 16px; color:var(--hint); font-size:15px; }
.empty-icon { font-size:40px; margin-bottom:10px; }
.btag { display:inline-block; background:#F1F5F9; border-radius:20px; padding:5px 12px; font-size:13px; color:var(--sub); margin:3px; font-weight:500; }
.frow { display:flex; gap:8px; margin-bottom:12px; }
.frow select { flex:1; font-size:15px; }
.ga-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.ga-row select { flex:1; font-size:15px; padding:11px 10px; }
.mvp-btn { width:100%; margin-top:12px; background:linear-gradient(135deg,#7C3AED,#6D28D9); color:#fff; border:none; padding:16px; border-radius:var(--rs); font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; box-shadow:0 4px 12px rgba(124,58,237,.35); }

/* 모달 */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:999; padding:20px; }
.mbox { background:var(--card); border-radius:var(--r); padding:28px 22px; width:100%; max-width:340px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
.mbox h3 { font-size:18px; font-weight:700; margin-bottom:10px; }
.mbox p { font-size:15px; color:var(--sub); margin-bottom:22px; line-height:1.5; }
.mbtns { display:flex; gap:10px; }
.mbtns .btn { flex:1; }

/* 연동 상태 */
.sync-bar { display:flex; align-items:center; gap:6px; padding:8px 16px; background:rgba(255,255,255,.15); border-radius:8px; margin-top:10px; font-size:12px; color:#fff; }
.sync-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-ok { background:#4ade80; }
.dot-err { background:#f87171; }
.dot-load { background:#fbbf24; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* 경기번호 입력 좁게 */
.game-no-row { display:flex; align-items:center; gap:10px; }
.game-no-row input { width:70px; flex:none; text-align:center; }
.game-no-row span { font-size:15px; color:var(--sub); }
</style>
</head>
<body>
<div class="app">

  <div class="modal" id="modal" style="display:none;">
    <div class="mbox">
      <h3 id="modal-title">확인</h3>
      <p id="modal-msg"></p>
      <div class="mbtns">
        <button class="btn btn-outline" id="modal-cancel">취소</button>
        <button class="btn btn-danger" id="modal-ok" style="flex:1;padding:13px;font-size:15px;">삭제</button>
      </div>
    </div>
  </div>

  <div class="hdr">
    <h1>⚽ 풋살 성적 기록</h1>
    <p>팀 매치 · 골 · 어시스트 트래커</p>
    <div class="sync-bar" id="sync-bar">
      <div class="sync-dot dot-load" id="sync-dot"></div>
      <span id="sync-msg">서버 연결 중...</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('record')">경기 기록</button>
    <button class="tab" onclick="switchTab('players')">선수 관리</button>
    <button class="tab" onclick="switchTab('stats')">통계</button>
  </div>

  <div id="tab-record" class="sec active">
    <div class="card" id="step1-card">
      <div class="step-ind">
        <div class="sn" id="sn1">1</div>
        <span class="st">날짜 · 참석자</span>
      </div>
      <div class="field">
        <div class="fl">날짜</div>
        <input type="date" id="game-date">
      </div>
      <div class="field">
        <div class="fl">참석 선수 선택</div>
        <div class="chips" id="attend-chips"></div>
        <div class="att-cnt" id="att-cnt"><span>0</span>명 선택됨</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" style="flex:1" onclick="selAll()">전체 선택</button>
        <button class="btn btn-outline" style="flex:1" onclick="selNone()">전체 해제</button>
      </div>
      <button class="btn btn-primary" style="margin-top:12px;" onclick="confirmAttend()">참석자 확정 →</button>
    </div>

    <div class="card" id="step2-card" style="display:none;">
      <div class="step-ind">
        <div class="sn done">✓</div>
        <span class="st">경기 입력</span>
        <button class="btn btn-outline" onclick="resetAttend()" style="margin-left:auto;padding:8px 14px;font-size:13px;">다시 선택</button>
      </div>
      <div id="bench-info" style="margin-bottom:12px;"></div>
      <hr class="divider">

      <div class="field">
        <div class="fl">경기 번호</div>
        <div class="game-no-row">
          <input type="number" id="game-no" min="1" max="20" value="1">
          <span>번째 경기</span>
        </div>
      </div>

      <div class="field">
        <div class="fl">팀 배정</div>
        <p class="tp-hint">각 팀에서 선수를 눌러 추가/제거하세요</p>
        <div class="team-panels">
          <div class="tp tp-a">
            <div class="tp-head tp-head-a">팀 A <span class="tp-cnt" id="cnt-a">(0/6)</span></div>
            <div class="tp-body" id="panel-a"></div>
          </div>
          <div class="tp tp-b">
            <div class="tp-head tp-head-b">팀 B <span class="tp-cnt" id="cnt-b">(0/6)</span></div>
            <div class="tp-body" id="panel-b"></div>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="fl">점수</div>
        <div class="scoreboard">
          <div class="sc-team"><div class="sc-label sc-a">TEAM A</div><div class="sc-input"><input type="number" id="score-a" min="0" value="0"></div></div>
          <div class="sc-div">:</div>
          <div class="sc-team"><div class="sc-label sc-b">TEAM B</div><div class="sc-input"><input type="number" id="score-b" min="0" value="0"></div></div>
        </div>
      </div>

      <div class="field">
        <div class="fl">골 · 어시스트 <span style="text-transform:none;font-weight:500;color:var(--hint);">(선택)</span></div>
        <div id="ga-inputs"></div>
        <button class="btn btn-outline" onclick="addGA()" style="width:100%;margin-top:6px;">+ 추가</button>
      </div>
      <button class="btn btn-primary" onclick="saveGame()">경기 저장</button>
    </div>

    <div class="card">
      <div class="card-title">경기 목록</div>
      <div class="frow">
        <select id="fy" onchange="renderLog()"><option value="">전체 연도</option></select>
        <select id="fm" onchange="renderLog()"><option value="">전체 월</option></select>
        <select id="fd" onchange="renderLog()"><option value="">전체 날짜</option></select>
      </div>
      <div id="game-log"></div>
    </div>
  </div>

  <div id="tab-players" class="sec">
    <div class="card">
      <div class="card-title">선수 추가</div>
      <div class="field"><input type="text" id="new-name" placeholder="선수 이름 입력"></div>
      <button class="btn btn-primary" onclick="addPlayer()">추가</button>
    </div>
    <div class="card">
      <div class="card-title">선수 목록 <span id="pcnt" style="font-size:14px;font-weight:500;color:var(--sub);"></span></div>
      <div id="player-list"></div>
    </div>
  </div>

  <div id="tab-stats" class="sec">
    <div class="frow">
      <select id="sy" onchange="renderStats()"><option value="">전체 연도</option></select>
      <select id="sm" onchange="renderStats()"><option value="">전체 월</option></select>
      <select id="sd" onchange="renderStats()"><option value="">전체 날짜</option></select>
    </div>
    <div class="stat-grid" id="stat-summary"></div>
    <div class="card" style="overflow-x:auto;">
      <div class="card-title">선수별 순위</div>
      <table class="rtable">
        <thead><tr><th>#</th><th>선수</th><th style="cursor:pointer;user-select:none;" onclick="sortStats('games')">경기<span id="sort-games"></span></th><th style="cursor:pointer;user-select:none;" onclick="sortStats('wins')">승<span id="sort-wins"></span></th><th style="cursor:pointer;user-select:none;" onclick="sortStats('draws')">무<span id="sort-draws"></span></th><th style="cursor:pointer;user-select:none;" onclick="sortStats('losses')">패<span id="sort-losses"></span></th><th style="cursor:pointer;user-select:none;" onclick="sortStats('points')">승점<span id="sort-points"></span></th><th style="cursor:pointer;user-select:none;" onclick="sortStats('goals')">골<span id="sort-goals"></span></th><th style="cursor:pointer;user-select:none;" onclick="sortStats('assists')">AS<span id="sort-assists"></span></th></tr></thead>
        <tbody id="stats-body"></tbody>
      </table>
    </div>
    <button class="mvp-btn" onclick="reqMvp()">MVP 추천받기 ✨</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// ★ Supabase 설정
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://qkbzjhqkyudvkjrdahun.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrYnpqaHFreXVkdmtqcmRhaHVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDcwNTEsImV4cCI6MjA5MjMyMzA1MX0.qbwg432XfRAMdlA4A1VTPg6NRKjTi0HitVs9iA1Xbis'; 

const SB = { url: SUPABASE_URL, key: SUPABASE_KEY };

// [수정] 타임아웃이 포함된 Fetch 함수
async function sbFetch(path, opts = {}) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), 8000); // 8초 타임아웃

  try {
    const res = await fetch(`${SB.url}/rest/v1/${path}`, {
      ...opts,
      signal: controller.signal,
      headers: {
        'apikey': SB.key,
        'Authorization': `Bearer ${SB.key}`,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || 'return=representation',
        ...(opts.headers || {})
      }
    });
    clearTimeout(id);
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch (err) {
    clearTimeout(id);
    throw err;
  }
}

let players = [], games = [];
let attendees = [], attendConfirmed = false;
let teamA = [], teamB = [];
let pendingCb = null;
let isOnline = false;

async function init() {
  setSyncStatus('load', '서버 연결 중...');
  
  // 개별적으로 데이터를 시도하여 하나가 실패해도 로컬 데이터를 활용할 수 있게 함
  try {
    const pData = await sbFetch('players?order=created_at');
    players = pData || [];
    isOnline = true;
  } catch(e) { console.error('Players load fail'); }

  try {
    const gData = await sbFetch('games?order=date,no');
    games = gData || [];
    isOnline = true;
  } catch(e) { console.error('Games load fail'); }

  if (!isOnline) {
    players = JSON.parse(localStorage.getItem('fp') || '[]');
    games   = JSON.parse(localStorage.getItem('fg') || '[]');
    setSyncStatus('err', '오프라인/타임아웃');
  } else {
    setSyncStatus('ok', '실시간 연동됨');
  }
  
  updateFilters(); 
  renderLog(); 
  renderAttend(); 
  renderPlayerList();
  renderStats();
  syncStatusFromServer();
}

async function syncStatusFromServer() {
  const date = document.getElementById('game-date').value;
  if (!isOnline || !date) return;
  
  try {
    const attData = await sbFetch(`attendance?date=eq.${date}`);
    if (attData && attData.length > 0) {
      attendees = attData[0].player_ids.map(id => isNaN(id) ? id : Number(id));
      renderAttend();
      
      attendConfirmed = true;
      document.getElementById('sn1').className = 'sn done';
      document.getElementById('sn1').textContent = '✓';
      document.getElementById('step2-card').style.display = 'block';
      document.getElementById('bench-info').innerHTML =
        `<div style="font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:600;">오늘 참석자 ${attendees.length}명 (동기화됨)</div>
         <div>${attendees.map(id=>`<span class="btag">${pname(id)}</span>`).join('')}</div>`;
      renderPanels();
    }

    const todayGames = games.filter(g => g.date === date);
    const gNoInput = document.getElementById('game-no');
    if (todayGames.length > 0) {
      const maxNo = Math.max(...todayGames.map(g => parseInt(g.no)));
      if(gNoInput) gNoInput.value = maxNo + 1;
    } else {
      if(gNoInput) gNoInput.value = 1;
    }
  } catch (e) {
    console.warn("Status sync fail:", e.message);
  }
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const msgEl = document.getElementById('sync-msg');
  if (msgEl) msgEl.textContent = msg;
  if (dot) dot.className = 'sync-dot ' + (state === 'ok' ? 'dot-ok' : state === 'err' ? 'dot-err' : 'dot-load');
}

function saveLocal() {
  localStorage.setItem('fp', JSON.stringify(players));
  localStorage.setItem('fg', JSON.stringify(games));
}

function showModal(title, msg, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal').style.display = 'flex';
  pendingCb = cb;
}
document.getElementById('modal-ok').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
  if (pendingCb) { pendingCb(); pendingCb = null; }
});
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
  pendingCb = null;
});

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['record','players','stats'][i]===t));
  document.querySelectorAll('.sec').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='stats') renderStats();
  if(t==='players') renderPlayerList();
  if(t==='record') { renderLog(); renderAttend(); }
}

function pname(id) { 
  if (!id) return '?';
  const p = players.find(x => String(x.id) === String(id)); 
  return p ? p.name : '?'; 
}

async function addPlayer() {
  const nm = document.getElementById('new-name').value.trim();
  if (!nm) return;
  if (players.find(p => p.name === nm)) { alert('이미 있는 이름이에요'); return; }
  const now = new Date().toISOString();
  if (isOnline) {
    try {
      const [row] = await sbFetch('players', { method:'POST', body: JSON.stringify({ name: nm, created_at: now }) });
      players.push(row);
    } catch(e) { alert('저장 실패: ' + e.message); return; }
  } else {
    players.push({ id: Date.now(), name: nm, created_at: now });
    saveLocal();
  }
  document.getElementById('new-name').value = '';
  renderPlayerList(); renderAttend();
}

async function removePlayer(id, name) {
  showModal('선수 삭제', `"${name}" 선수를 삭제할까요?`, async () => {
    if (isOnline) {
      try { await sbFetch(`players?id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' }); }
      catch(e) { alert('삭제 실패: ' + e.message); return; }
    }
    players = players.filter(p => String(p.id) !== String(id));
    attendees = attendees.filter(x => String(x) !== String(id));
    teamA = teamA.filter(x => String(x) !== String(id));
    teamB = teamB.filter(x => String(x) !== String(id));
    saveLocal();
    renderPlayerList(); renderAttend();
    if (attendConfirmed) renderPanels();
  });
}

// ★ 수정 1: 선수 목록 가나다순 정렬, 용병 포함 시 맨 뒤
function sortPlayers(arr) {
  return [...arr].sort((a, b) => {
    const aYong = a.name.includes('용병');
    const bYong = b.name.includes('용병');
    if (aYong && !bYong) return 1;
    if (!aYong && bYong) return -1;
    return a.name.localeCompare(b.name, 'ko');
  });
}

function renderPlayerList() {
  const el = document.getElementById('player-list');
  document.getElementById('pcnt').textContent = `(${players.length}명)`;
  if (!players.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">👟</div>선수를 추가해주세요</div>'; return; }
  el.innerHTML = '';
  sortPlayers(players).forEach(p => {
    const row = document.createElement('div'); row.className = 'pr';
    row.innerHTML = `<div class="pi"><div class="pav">${p.name.charAt(0)}</div><span class="pn">${p.name}</span></div>`;
    const btn = document.createElement('button'); btn.className = 'btn btn-danger'; btn.textContent = '삭제';
    btn.addEventListener('click', () => removePlayer(p.id, p.name));
    row.appendChild(btn); el.appendChild(row);
  });
}

function renderAttend() {
  const el = document.getElementById('attend-chips'); el.innerHTML = '';
  if (!players.length) { el.innerHTML = '<span style="font-size:14px;color:var(--hint);">선수 관리 탭에서 먼저 추가해주세요</span>'; updateAttCnt(); return; }
  sortPlayers(players).forEach(p => {
    const on = attendees.some(id => String(id) === String(p.id));
    const c = document.createElement('span'); c.className = 'chip' + (on ? ' on' : '');
    c.textContent = (on ? '✓ ' : '') + p.name;
    c.addEventListener('click', () => toggleAttend(p.id));
    el.appendChild(c);
  });
  updateAttCnt();
}
function updateAttCnt() {
  const cntEl = document.getElementById('att-cnt');
  if (cntEl) cntEl.innerHTML = `<span>${attendees.length}</span>명 선택됨`;
}
function toggleAttend(id) {
  attendees.some(aid => String(aid) === String(id)) ? 
    attendees = attendees.filter(x => String(x) !== String(id)) : 
    attendees.push(id);
  renderAttend();
}
function selAll() { attendees = players.map(p=>p.id); renderAttend(); }
function selNone() { attendees = []; renderAttend(); }

async function confirmAttend() {
  if (attendees.length < 2) { alert('최소 2명 이상 선택하세요'); return; }
  
  const date = document.getElementById('game-date').value;
  if (isOnline && date) {
    try {
      await sbFetch('attendance', { 
        method: 'POST', 
        headers: { 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ date: date, player_ids: attendees }) 
      });
    } catch (e) {
      console.warn("참석 명단 동기화 실패:", e);
    }
  }

  attendConfirmed = true; teamA = []; teamB = [];
  document.getElementById('sn1').className = 'sn done';
  document.getElementById('sn1').textContent = '✓';
  document.getElementById('step2-card').style.display = 'block';
  document.getElementById('bench-info').innerHTML =
    `<div style="font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:600;">오늘 참석자 ${attendees.length}명</div>
     <div>${attendees.map(id=>`<span class="btag">${pname(id)}</span>`).join('')}</div>`;
  renderPanels();
  document.getElementById('step2-card').scrollIntoView({ behavior:'smooth', block:'start' });
}

function resetAttend() {
  attendConfirmed = false; teamA = []; teamB = [];
  document.getElementById('sn1').className = 'sn'; document.getElementById('sn1').textContent = '1';
  document.getElementById('step2-card').style.display = 'none';
}

function renderPanels() {
  ['a','b'].forEach(t => {
    const el = document.getElementById('panel-'+t); el.innerHTML = '';
    const myTeam = t==='a' ? teamA : teamB;
    const otherTeam = t==='a' ? teamB : teamA;
    attendees.forEach(id => {
      const inMe = myTeam.some(tid => String(tid) === String(id));
      const inOther = otherTeam.some(tid => String(tid) === String(id));
      if (inOther) return; 
      const btn = document.createElement('button');
      btn.className = 'tp-chip' + (inMe ? (t==='a' ? ' in-a' : ' in-b') : '');
      btn.textContent = (inMe ? '✓ ' : '') + pname(id);
      btn.addEventListener('click', () => toggleTeam(t, id));
      el.appendChild(btn);
    });
    document.getElementById('cnt-'+t).textContent = `(${myTeam.length}/6)`;
  });
}

function toggleTeam(team, id) {
  if (team==='a') {
    teamA.some(tid => String(tid) === String(id)) ? teamA = teamA.filter(x=>String(x)!==String(id)) : (teamA.length < 6 ? teamA.push(id) : alert('팀당 최대 6명이에요'));
  } else {
    teamB.some(tid => String(tid) === String(id)) ? teamB = teamB.filter(x=>String(x)!==String(id)) : (teamB.length < 6 ? teamB.push(id) : alert('팀당 최대 6명이에요'));
  }
  renderPanels();
}

function updateScoreByGA() {
  let sa = 0, sb = 0;
  document.querySelectorAll('#ga-inputs .ga-row').forEach(r => {
    const selects = r.querySelectorAll('select');
    const pid = selects[0].value;
    const type = selects[1].value;
    if (type === 'goal') {
      if (teamA.some(id => String(id) === String(pid))) sa++;
      else if (teamB.some(id => String(id) === String(pid))) sb++;
    }
  });
  document.getElementById('score-a').value = sa;
  document.getElementById('score-b').value = sb;
}

function addGA() {
  const row = document.createElement('div'); row.className = 'ga-row';
  const s1 = document.createElement('select');
  s1.addEventListener('change', updateScoreByGA);
  attendees.forEach(id => { const o=document.createElement('option'); o.value=id; o.textContent=pname(id); s1.appendChild(o); });
  
  const s2 = document.createElement('select');
  s2.addEventListener('change', updateScoreByGA);
  [['goal','골'],['assist','어시스트']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; s2.appendChild(o); });
  
  const btn = document.createElement('button'); btn.className='btn btn-danger'; btn.style.padding='11px 14px'; btn.textContent='×';
  btn.addEventListener('click', () => { row.remove(); updateScoreByGA(); });
  
  row.appendChild(s1); row.appendChild(s2); row.appendChild(btn);
  document.getElementById('ga-inputs').appendChild(row);
  updateScoreByGA();
}

async function saveGame() {
  const date = document.getElementById('game-date').value;
  const no = parseInt(document.getElementById('game-no').value);
  const sa = parseInt(document.getElementById('score-a').value)||0;
  const sb = parseInt(document.getElementById('score-b').value)||0;
  if (!date) { alert('날짜를 입력하세요'); return; }
  if (teamA.length!==6||teamB.length!==6) { alert('각 팀 6명씩 배정해주세요'); return; }
  const goals=[], assists=[];
  document.querySelectorAll('#ga-inputs .ga-row').forEach(r=>{
    const s=r.querySelectorAll('select');
    const pid = s[0].value;
    (s[1].value==='goal'?goals:assists).push(pid);
  });
  const rA=sa>sb?'win':sa===sb?'draw':'loss';
  const rB=sa<sb?'win':sa===sb?'draw':'loss';
  const payload = { date, no, team_a:teamA, team_b:teamB, score_a:sa, score_b:sb, result_a:rA, result_b:rB, goals, assists };

  if (isOnline) {
    try {
      const [row] = await sbFetch('games', { method:'POST', body: JSON.stringify(payload) });
      games.push(row);
      init(); 
    } catch(e) { alert('저장 실패: ' + e.message); return; }
  } else {
    const g = { id: Date.now(), ...payload };
    games.push(g); saveLocal();
  }

  teamA=[]; teamB=[];
  document.getElementById('score-a').value=0; document.getElementById('score-b').value=0;
  document.getElementById('ga-inputs').innerHTML='';
  document.getElementById('game-no').value = no+1;
  renderPanels(); updateFilters(); renderLog();
  alert(`${no}번째 경기 저장됐어요!`);
}

async function deleteGame(id) {
  const g = games.find(x=>String(x.id)===String(id));
  showModal('경기 삭제', `${g.date} ${g.no}번째 경기를 삭제할까요?`, async () => {
    if (isOnline) {
      try { await sbFetch(`games?id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' }); }
      catch(e) { alert('삭제 실패: ' + e.message); return; }
    }
    games = games.filter(x=>String(x.id)!==String(id)); 
    saveLocal(); updateFilters(); renderLog();
    init(); 
  });
}

function updateFilters() {
  const years=[...new Set(games.map(g=>g.date?.slice(0,4)).filter(Boolean))].sort().reverse();
  ['fy','sy'].forEach(id=>{ 
    const el=document.getElementById(id); if(!el) return;
    const cur=el.value; 
    el.innerHTML='<option value="">전체 연도</option>'+years.map(y=>`<option value="${y}"${y===cur?' selected':''}>${y}년</option>`).join(''); 
  });
  const months=['01','02','03','04','05','06','07','08','09','10','11','12'];
  ['fm','sm'].forEach(id=>{ 
    const el=document.getElementById(id); if(!el) return;
    const cur=el.value; 
    el.innerHTML='<option value="">전체 월</option>'+months.map(m=>`<option value="${m}"${m===cur?' selected':''}>${parseInt(m)}월</option>`).join(''); 
  });
  const dates=[...new Set(games.map(g=>g.date).filter(Boolean))].sort().reverse();
  ['fd','sd'].forEach(id=>{ 
    const el=document.getElementById(id); if(!el) return;
    const cur=el.value;
    el.innerHTML='<option value="">전체 날짜</option>'+dates.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');
  });
}

function fg(yid,mid,did) {
  const yr=document.getElementById(yid)?.value || "";
  const mo=document.getElementById(mid)?.value || "";
  const dy=did ? (document.getElementById(did)?.value || "") : "";
  return games.filter(g=>(!yr||g.date?.startsWith(yr))&&(!mo||g.date?.slice(5,7)===mo)&&(!dy||g.date===dy));
}

function gTeamA(g) { return g.team_a || g.teamA || []; }
function gTeamB(g) { return g.team_b || g.teamB || []; }
function gScoreA(g) { return g.score_a ?? g.scoreA ?? 0; }
function gScoreB(g) { return g.score_b ?? g.scoreB ?? 0; }
function gResultA(g) { return g.result_a || g.resultA; }
function gResultB(g) { return g.result_b || g.resultB; }
function gGoals(g) { return g.goals || []; }
function gAssists(g) { return g.assists || []; }

function renderLog() {
  const el=document.getElementById('game-log'); if(!el) return;
  const list=fg('fy','fm','fd');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>기록된 경기가 없어요</div>';return;}
  el.innerHTML='';
  [...list].sort((a,b)=>b.date?.localeCompare(a.date)||b.no-a.no).forEach(g=>{
    const rA=gResultA(g), rB=gResultB(g);
    const bA=rA==='win'?'bw':rA==='draw'?'bd':'bl', tA=rA==='win'?'승':rA==='draw'?'무':'패';
    const bB=rB==='win'?'bw':rB==='draw'?'bd':'bl', tB=rB==='win'?'승':rB==='draw'?'무':'패';
    const goalText = gGoals(g).length ? '골: ' + gGoals(g).map(pname).join(', ') : '';
    const assistText = gAssists(g).length ? '어시스트: ' + gAssists(g).map(pname).join(', ') : '';
    
    const card=document.createElement('div'); card.className='gc';
    card.innerHTML=`
      <div class="gc-hdr"><span class="gc-date">${g.date} · ${g.no}번째</span></div>
      <div class="gc-row">
        <div><span class="badge ${bA}" style="margin-bottom:6px;display:inline-flex;">${tA}</span><div class="gc-names">${gTeamA(g).map(pname).join(', ')}</div></div>
        <div class="gc-score">${gScoreA(g)}:${gScoreB(g)}</div>
        <div style="text-align:right;"><span class="badge ${bB}" style="margin-bottom:6px;display:inline-flex;">${tB}</span><div class="gc-names">${gTeamB(g).map(pname).join(', ')}</div></div>
      </div>
      ${goalText||assistText?`<div class="gc-gi">${goalText}${goalText&&assistText?' · ':''}${assistText}</div>`:''}
    `;
    const hdr=card.querySelector('.gc-hdr');
    const del=document.createElement('button'); del.className='btn btn-danger'; del.textContent='삭제'; del.style.cssText='padding:6px 14px;font-size:13px;';
    del.addEventListener('click',()=>deleteGame(g.id)); hdr.appendChild(del);
    el.appendChild(card);
  });
}

// ★ 수정 3: 기본 정렬 승점 내림차순 (-1)
let sortKey = 'points', sortDir = -1;

function sortStats(key) {
  if (sortKey === key) { sortDir *= -1; }
  else { sortKey = key; sortDir = -1; }
  renderStats();
}

function renderStats() {
  const list=fg('sy','sm','sd');
  const sm={};
  players.forEach(p=>{ sm[p.id]={name:p.name,games:0,wins:0,draws:0,losses:0,points:0,goals:0,assists:0}; });
  list.forEach(g=>{
    gTeamA(g).forEach(id=>{ if(!sm[id])return; sm[id].games++; if(gResultA(g)==='win'){sm[id].wins++;sm[id].points+=2;}else if(gResultA(g)==='draw'){sm[id].draws++;sm[id].points++;}else sm[id].losses++; });
    gTeamB(g).forEach(id=>{ if(!sm[id])return; sm[id].games++; if(gResultB(g)==='win'){sm[id].wins++;sm[id].points+=2;}else if(gResultB(g)==='draw'){sm[id].draws++;sm[id].points++;}else sm[id].losses++; });
    
    gGoals(g).forEach(id=>{ if(sm[id]) sm[id].goals++; else {
      const foundId = Object.keys(sm).find(key => String(key) === String(id));
      if (foundId) sm[foundId].goals++;
    }});
    gAssists(g).forEach(id=>{ if(sm[id]) sm[id].assists++; else {
      const foundId = Object.keys(sm).find(key => String(key) === String(id));
      if (foundId) sm[foundId].assists++;
    }});
  });
  const rows=Object.values(sm);
  const byGames = [...rows].filter(r=>r.games>0).sort((a,b)=>b.games-a.games);
  const byGoals = [...rows].filter(r=>r.goals>0).sort((a,b)=>b.goals-a.goals);
  const byAssists = [...rows].filter(r=>r.assists>0).sort((a,b)=>b.assists-a.assists);
  const byPoints = [...rows].filter(r=>r.points>0).sort((a,b)=>b.points-a.points);

  // ★ 수정 2: 승률 카드 추가 (승률 = 승 / 경기 * 100)
  const byWinRate = [...rows].filter(r=>r.games>0).sort((a,b)=>(b.wins/b.games)-(a.wins/a.games));
  const topWinRate = byWinRate[0];
  const topWinRateStr = topWinRate ? Math.round(topWinRate.wins/topWinRate.games*100)+'%' : '0%';
  
  const statSumm = document.getElementById('stat-summary');
  if(statSumm) {
    statSumm.innerHTML=`
      <div class="sb">
        <div class="sb-label">승점</div>
        <div class="sb-val">${byPoints[0]?.points??0}<span>점</span></div>
        <div class="sb-leader">${byPoints[0]?'🏆 '+byPoints[0].name:'-'}</div>
      </div>
      <div class="sb">
        <div class="sb-label">승률</div>
        <div class="sb-val">${topWinRate ? Math.round(topWinRate.wins/topWinRate.games*100) : 0}<span>%</span></div>
        <div class="sb-leader">${topWinRate?'📈 '+topWinRate.name+' '+topWinRateStr:'-'}</div>
      </div>
      <div class="sb">
        <div class="sb-label">득점</div>
        <div class="sb-val">${byGoals[0]?.goals??0}<span>골</span></div>
        <div class="sb-leader">${byGoals[0]?'🥅 '+byGoals[0].name:'-'}</div>
      </div>
      <div class="sb">
        <div class="sb-label">어시스트</div>
        <div class="sb-val">${byAssists[0]?.assists??0}<span>AS</span></div>
        <div class="sb-leader">${byAssists[0]?'🎯 '+byAssists[0].name:'-'}</div>
      </div>
      <div class="sb" style="grid-column:1/-1;">
        <div class="sb-label">출장 경기</div>
        <div class="sb-val">${list.length}<span>경기</span></div>
        <div class="sb-leader">${byGames[0]?'👑 '+byGames[0].name+' '+byGames[0].games+'경기':'-'}</div>
      </div>
    `;
  }

  // 경기 참석한 모든 선수 표시 (승점 없어도 포함)
  let sorted = [...rows].filter(r=>r.games>0);
  sorted.sort((a,b) => sortDir * (b[sortKey] - a[sortKey]));

  // 정렬 화살표 업데이트
  ['games','wins','draws','losses','points','goals','assists'].forEach(k=>{
    const el=document.getElementById('sort-'+k);
    if(el) el.textContent = sortKey===k ? (sortDir===-1?' ▼':' ▲') : '';
  });

  const tbody=document.getElementById('stats-body');
  if(!tbody) return;
  if(!sorted.length){tbody.innerHTML='<tr><td colspan="9" class="empty">데이터 없음</td></tr>';return;}
  tbody.innerHTML=sorted.map((s,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'r0';
    return `<tr><td><span class="rn ${rc}">${i+1}</span></td><td>${s.name}</td><td>${s.games}</td>
      <td style="color:var(--win);font-weight:700;">${s.wins}</td><td style="color:var(--draw);">${s.draws}</td><td style="color:var(--loss);">${s.losses}</td>
      <td><span class="pts">${s.points}</span></td><td>${s.goals}</td><td>${s.assists}</td></tr>`;
  }).join('');
}

function reqMvp() {
  const list=fg('sy','sm','sd');
  if(!list.length){alert('먼저 경기 데이터를 입력해주세요!');return;}
  const sm={};
  players.forEach(p=>{sm[p.id]={name:p.name,games:0,wins:0,points:0,goals:0,assists:0};});
  list.forEach(g=>{
    gTeamA(g).forEach(id=>{if(!sm[id])return;sm[id].games++;if(gResultA(g)==='win'){sm[id].wins++;sm[id].points+=2;}else if(gResultA(g)==='draw')sm[id].points++;});
    gTeamB(g).forEach(id=>{if(!sm[id])return;sm[id].games++;if(gResultB(g)==='win'){sm[id].wins++;sm[id].points+=2;}else if(gResultB(g)==='draw')sm[id].points++;});
    gGoals(g).forEach(id=>{if(sm[id])sm[id].goals++;});
    gAssists(g).forEach(id=>{if(sm[id])sm[id].assists++;});
  });
  const summary=Object.values(sm).filter(s=>s.games>0).map(s=>`${s.name}: ${s.games}경기 ${s.wins}승 ${s.points}점 골${s.goals} AS${s.assists}`).join('\n');
  if(typeof sendPrompt==='function') sendPrompt(`아래 풋살 통계를 분석해서 MVP를 추천해줘:\n${summary}`);
  else alert('Claude 앱에서 MVP 추천받기 버튼을 눌러주세요!');
}

const dateEl = document.getElementById('game-date');
if (dateEl) {
  dateEl.value = new Date().toISOString().slice(0,10);
  dateEl.addEventListener('change', () => {
    attendees = []; attendConfirmed = false; teamA = []; teamB = [];
    const gNoEl = document.getElementById('game-no'); if (gNoEl) gNoEl.value = 1; 
    const sn1 = document.getElementById('sn1'); if (sn1) { sn1.className = 'sn'; sn1.textContent = '1'; }
    const s2c = document.getElementById('step2-card'); if (s2c) s2c.style.display = 'none';
    // 날짜 변경시 경기 목록 필터를 해당 날짜로 자동 설정
    const fdEl = document.getElementById('fd');
    if (fdEl) {
      const newDate = dateEl.value;
      const existing = [...fdEl.options].find(o => o.value === newDate);
      if (existing) fdEl.value = newDate;
      else fdEl.value = '';
    }
    syncStatusFromServer();
    renderAttend();
    renderLog();
  });
}
const nameInput = document.getElementById('new-name');
if (nameInput) nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') addPlayer(); });

init();
